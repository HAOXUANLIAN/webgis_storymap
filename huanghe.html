<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>不同序列评价下黄河天然来水量（亿立方米）</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    body{padding:30px; font-family: "Microsoft YaHei", sans-serif;}
    .box{max-width:1000px; margin:0 auto;}
    h2{font-size: 20px; text-align: center; color:#333;}
</style>
</head>
<body>
<div class="box">
    <h2>不同序列评价下黄河天然来水量（亿立方米）</h2>
    <canvas id="chart1"></canvas>
</div>

<script>
const ctx1 = document.getElementById('chart1').getContext('2d');
new Chart(ctx1, {
    type: 'bar',
    data: {
        labels: ['1919—1975 “八七分水方案”', '1956—2000 第二次水资源调查评价', '1956—2010 《黄河流域水文设计成果修订报告》'],
        datasets: [{
            label: '黄河多年平均天然径流量（亿立方米）',
            data: [580, 535, 482],
            backgroundColor: ['#4285F4','#4285F4','#4285F4'],
            borderWidth:1
        }]
    },
    options: {
        responsive: true,
        animation: { duration: 2000, easing: 'easeOutQuart' },
        plugins: {
            legend: {
                labels: { font: { size: 18 } }
            }
        },
        scales: {
            y: {
                beginAtZero: true,
                ticks: { font: { size: 18 } }
            },
            x: {
                ticks: { font: { size: 20 } }
            }
        }
    }
});
</script>
</body>
</html>
